<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lol Stats</title>
<style>
  body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #111; color: #ddd; }
  h1 { font-size: 1.2em; color: #fff; margin-bottom: 24px; }
  h2 { font-size: 0.9em; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin: 32px 0 8px; }
  button { padding: 8px 16px; background: #222; border: 1px solid #444; cursor: pointer; color: #ccc; font-family: monospace; }
  button:hover { border-color: #888; }
  #stats { display: none; }
  #status { display: inline-block; margin-left: 12px; color: #555; font-size: 0.8em; }
  .total { font-size: 3em; color: #fff; }
  .streak-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }
  .streak-box { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 16px; }
  .streak-box .val { font-size: 2em; color: #fff; }
  .streak-box .lbl { font-size: 0.75em; color: #666; margin-top: 4px; }
  .chart-wrap { position: relative; height: 200px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 8px; }
  th { text-align: left; color: #666; padding: 4px 8px; border-bottom: 1px solid #222; }
  td { padding: 4px 8px; border-bottom: 1px solid #1a1a1a; }
  td.num { text-align: right; color: #aaa; }

  /* Heatmap */
  .heatmap { display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px; margin-top: 8px; font-size: 0.7em; }
  .heatmap .cell { height: 18px; background: #1a1a1a; border-radius: 2px; }
  .heatmap .row-label { color: #555; display: flex; align-items: center; }
  .heatmap .col-labels { display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px; margin-bottom: 2px; }
  .heatmap .col-label { text-align: center; color: #444; font-size: 0.65em; }
</style>
</head>
<body>

<h1>:lol: Stats</h1>
<button id="pickBtn">Load lol.db</button>
<span id="status"></span>

<div id="stats">
  <h2>Total lols</h2>
  <div class="total" id="total"></div>

  <h2>Streaks &amp; Records</h2>
  <div class="streak-grid">
    <div class="streak-box"><div class="val" id="currentStreak"></div><div class="lbl">current day streak</div></div>
    <div class="streak-box"><div class="val" id="bestStreak"></div><div class="lbl">best day streak</div></div>
    <div class="streak-box"><div class="val" id="bestDay"></div><div class="lbl">most lols in one day</div></div>
  </div>

  <h2>Lols per day (last 30 days)</h2>
  <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>

  <h2>Hourly distribution</h2>
  <div class="chart-wrap"><canvas id="hourlyChart"></canvas></div>

  <h2>Hour × weekday heatmap</h2>
  <div id="heatmapWrap"></div>

  <h2>Recent lols</h2>
  <table id="recentTable">
    <tr><th>When</th></tr>
  </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(async () => {
  let SQL, fileHandle, lastModified = 0;
  let dailyChart, hourlyChart;

  Chart.defaults.color = '#666';
  Chart.defaults.borderColor = '#222';

  const idb = await new Promise((res, rej) => {
    const r = indexedDB.open('lol-stats', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('handles');
    r.onsuccess = () => res(r.result);
    r.onerror = rej;
  });

  function idbGet(key) {
    return new Promise((res, rej) => {
      const tx = idb.transaction('handles', 'readonly').objectStore('handles').get(key);
      tx.onsuccess = () => res(tx.result);
      tx.onerror = rej;
    });
  }

  function idbSet(key, val) {
    return new Promise((res, rej) => {
      const tx = idb.transaction('handles', 'readwrite').objectStore('handles').put(val, key);
      tx.onsuccess = res;
      tx.onerror = rej;
    });
  }

  async function startPolling(handle) {
    fileHandle = handle;
    SQL = SQL ?? await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
    lastModified = 0;
    await refresh();
    setInterval(refresh, 2000);
    document.getElementById('pickBtn').textContent = fileHandle.name + ' ✓';
  }

  const saved = await idbGet('fileHandle');
  if (saved && (await saved.queryPermission({ mode: 'read' })) === 'granted')
    startPolling(saved);

  document.getElementById('pickBtn').addEventListener('click', async () => {
    const opts = { types: [{ accept: { 'application/x-sqlite3': ['.db'] } }] };
    if (fileHandle) opts.startIn = fileHandle;
    else if (saved) opts.startIn = saved;
    [fileHandle] = await window.showOpenFilePicker(opts);
    await idbSet('fileHandle', fileHandle);
    await startPolling(fileHandle);
  });

  function computeStreaks(allDays) {
    // allDays: sorted array of 'YYYY-MM-DD' strings with at least 1 lol
    if (!allDays.length) return { current: 0, best: 0 };
    const daySet = new Set(allDays);
    const toMs = d => new Date(d + 'T00:00:00Z').getTime();
    const ONE_DAY = 86400000;

    // current streak: from today backwards
    const todayMs = toMs(new Date().toISOString().slice(0, 10));
    let current = 0;
    let cursor = todayMs;
    while (daySet.has(new Date(cursor).toISOString().slice(0, 10))) {
      current++;
      cursor -= ONE_DAY;
    }

    // best streak
    const sorted = [...daySet].sort();
    let best = 1, run = 1;
    for (let i = 1; i < sorted.length; i++) {
      const diff = toMs(sorted[i]) - toMs(sorted[i - 1]);
      if (diff === ONE_DAY) { run++; if (run > best) best = run; }
      else run = 1;
    }

    return { current, best };
  }

  function buildHeatmap(heatData) {
    // heatData: { 'dow:hour': count }
    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const max = Math.max(1, ...Object.values(heatData));

    let html = '<div class="col-labels"><div></div>';
    for (let h = 0; h < 24; h++)
      html += `<div class="col-label">${h}</div>`;
    html += '</div><div class="heatmap">';

    for (let d = 0; d < 7; d++) {
      html += `<div class="row-label">${DAYS[d]}</div>`;
      for (let h = 0; h < 24; h++) {
        const n = heatData[`${d}:${h}`] || 0;
        const alpha = n ? (0.15 + 0.85 * (n / max)).toFixed(2) : 0;
        const bg = n ? `rgba(99,230,99,${alpha})` : '#1a1a1a';
        const title = n ? `${DAYS[d]} ${h}:00 — ${n} lol${n>1?'s':''}` : '';
        html += `<div class="cell" style="background:${bg}" title="${title}"></div>`;
      }
    }
    html += '</div>';
    document.getElementById('heatmapWrap').innerHTML = html;
  }

  async function refresh() {
    const file = await fileHandle.getFile();
    if (file.lastModified === lastModified) return;
    lastModified = file.lastModified;

    const db = new SQL.Database(new Uint8Array(await file.arrayBuffer()));
    const q = (sql, params) => { const r = db.exec(sql, params); return r[0]; };

    // Total
    document.getElementById('total').textContent =
      q("SELECT COUNT(*) FROM lols").values[0][0];

    // Streaks
    const dayRows = q("SELECT date(lolled_at) as d FROM lols GROUP BY d ORDER BY d").values;
    const allDays = dayRows.map(r => r[0]);
    const { current, best } = computeStreaks(allDays);
    document.getElementById('currentStreak').textContent = current;
    document.getElementById('bestStreak').textContent = best;

    const bestDayRow = q("SELECT date(lolled_at) as d, COUNT(*) as n FROM lols GROUP BY d ORDER BY n DESC LIMIT 1");
    document.getElementById('bestDay').textContent = bestDayRow ? bestDayRow.values[0][1] : 0;

    // Daily chart (last 30 days) — fill missing days with 0
    const dailyRows = q(`
      SELECT date(lolled_at) as d, COUNT(*) as n
      FROM lols
      WHERE lolled_at >= date('now', '-29 days')
      GROUP BY d ORDER BY d
    `);
    const dailyMap = {};
    if (dailyRows) for (const [d, n] of dailyRows.values) dailyMap[d] = n;
    const dailyLabels = [], dailyData = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
      dailyLabels.push(d.slice(5)); // MM-DD
      dailyData.push(dailyMap[d] || 0);
    }
    if (dailyChart) {
      dailyChart.data.labels = dailyLabels;
      dailyChart.data.datasets[0].data = dailyData;
      dailyChart.update();
    } else {
      dailyChart = new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: {
          labels: dailyLabels,
          datasets: [{ data: dailyData, borderColor: '#63e663', backgroundColor: 'rgba(99,230,99,0.1)',
            borderWidth: 1.5, pointRadius: 2, fill: true, tension: 0.3 }]
        },
        options: { plugins: { legend: { display: false } }, scales: {
          x: { ticks: { maxTicksLimit: 10 } },
          y: { beginAtZero: true, ticks: { stepSize: 1 } }
        }, animation: false }
      });
    }

    // Hourly chart
    const hourlyRows = q("SELECT CAST(strftime('%H', lolled_at) AS INTEGER) as h, COUNT(*) as n FROM lols GROUP BY h ORDER BY h");
    const hourlyData = Array(24).fill(0);
    if (hourlyRows) for (const [h, n] of hourlyRows.values) hourlyData[h] = n;
    const hourlyLabels = Array.from({length: 24}, (_, i) => i + ':00');
    if (hourlyChart) {
      hourlyChart.data.datasets[0].data = hourlyData;
      hourlyChart.update();
    } else {
      hourlyChart = new Chart(document.getElementById('hourlyChart'), {
        type: 'bar',
        data: {
          labels: hourlyLabels,
          datasets: [{ data: hourlyData, backgroundColor: 'rgba(99,230,99,0.4)', borderColor: '#63e663', borderWidth: 1 }]
        },
        options: { plugins: { legend: { display: false } }, scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } }
        }, animation: false }
      });
    }

    // Heatmap
    const heatRows = q("SELECT CAST(strftime('%w', lolled_at) AS INTEGER) as dow, CAST(strftime('%H', lolled_at) AS INTEGER) as h, COUNT(*) as n FROM lols GROUP BY dow, h");
    const heatData = {};
    if (heatRows) for (const [dow, h, n] of heatRows.values) heatData[`${dow}:${h}`] = n;
    buildHeatmap(heatData);

    // Recent
    const recentRows = q("SELECT lolled_at FROM lols ORDER BY lolled_at DESC LIMIT 20");
    const recentTable = document.getElementById('recentTable');
    recentTable.innerHTML = '<tr><th>When</th></tr>';
    if (recentRows) for (const [ts] of recentRows.values)
      recentTable.innerHTML += `<tr><td>${new Date(ts).toLocaleString()}</td></tr>`;

    db.close();
    document.getElementById('stats').style.display = 'block';
    document.getElementById('status').textContent = 'updated ' + new Date().toLocaleTimeString();
  }
})();
</script>
</body>
</html>
