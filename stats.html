<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lol Stats</title>
<style>
  :root {
    --bg: #0e0e0e; --bg-surface: #151515; --bg-surface-2: #1a1a1a;
    --bg-hover: #161616; --bg-cell: #181818;
    --text: #c8c8c8; --text-dim: #666; --text-dimmer: #444;
    --text-muted: #8b949e; --text-strong: #fff;
    --border: #252525; --border-subtle: #1e1e1e; --border-row: #181818;
    --accent: #55aaff; --green: #63e663; --green-rgb: 99,230,99;
    --chart-border: #222; --chart-text: #666;
    --gh-0: #161b22; --gh-1: #0e4429; --gh-2: #006d32; --gh-3: #26a641; --gh-4: #39d353;
    --tip-bg: rgba(0,0,0,0.8);
  }
  body.light {
    --bg: #f6f8fa; --bg-surface: #ffffff; --bg-surface-2: #f6f8fa;
    --bg-hover: #eaeef2; --bg-cell: #ebedf0;
    --text: #24292f; --text-dim: #57606a; --text-dimmer: #8c959f;
    --text-muted: #57606a; --text-strong: #1f2328;
    --border: #d0d7de; --border-subtle: #d0d7de; --border-row: #d0d7de;
    --accent: #0969da; --green: #2ea043; --green-rgb: 46,160,67;
    --chart-border: #d0d7de; --chart-text: #57606a;
    --gh-0: #ebedf0; --gh-1: #9be9a8; --gh-2: #40c463; --gh-3: #30a14e; --gh-4: #216e39;
    --tip-bg: rgba(36,41,47,0.9);
  }

  body { font-family: monospace; max-width: 1400px; margin: 32px auto; padding: 0 32px; background: var(--bg); color: var(--text); font-size: 16px; transition: background 0.35s, color 0.35s; }
  h1 { font-size: 1.6em; color: var(--text-strong); margin-bottom: 28px; letter-spacing: 0.05em; }
  h2 { font-size: 0.85em; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin: 40px 0 12px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 6px; transition: color 0.35s, border-color 0.35s; }
  button { padding: 10px 20px; background: var(--bg-surface-2); border: 1px solid var(--border); cursor: pointer; color: var(--text-dim); font-family: monospace; font-size: 1em; border-radius: 3px; transition: background 0.35s, border-color 0.2s, color 0.2s; }
  button:hover { border-color: var(--accent); color: var(--text-strong); }
  #shareBtn { display: none; }
  #shareFeedback { display: inline-block; margin-left: 10px; color: var(--green); font-size: 0.85em; opacity: 0; transition: opacity 0.3s; }
  #stats { display: none; }
  #status { display: inline-block; margin-left: 16px; color: var(--text-dimmer); font-size: 0.85em; }
  .total { font-size: 4em; color: var(--text-strong); font-weight: bold; display: inline-block; }
  .streak-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 12px; }
  .streak-box { background: var(--bg-surface); border: 1px solid var(--border); padding: 24px; border-radius: 4px; transition: background 0.35s, border-color 0.35s; }
  .streak-box .val { font-size: 2.8em; color: var(--green); font-weight: bold; display: inline-block; }
  .streak-box .lbl { font-size: 0.85em; color: var(--text-dim); margin-top: 6px; }
  .chart-wrap { position: relative; height: 260px; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 1em; margin-top: 12px; }
  th { text-align: left; color: var(--accent); padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.35s, border-color 0.35s; }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border-row); color: var(--text); transition: color 0.35s, border-color 0.35s; }
  tr:hover td { background: var(--bg-hover); }

  /* Heatmap */
  .heatmap { display: grid; grid-template-columns: 44px repeat(24, 1fr); gap: 3px; margin-top: 12px; font-size: 0.85em; }
  .heatmap .cell { height: 26px; background: var(--bg-cell); border-radius: 3px; transition: background 0.35s; }
  .heatmap .row-label { color: var(--text-dim); display: flex; align-items: center; font-size: 0.8em; }
  .heatmap .col-label { text-align: center; color: var(--text-dimmer); font-size: 0.7em; height: 18px; display: flex; align-items: center; justify-content: center; }

  /* GitHub-style year heatmap */
  .gh-heatmap-wrap { overflow-x: auto; margin-top: 12px; padding-bottom: 4px; }
  .gh-heatmap { position: relative; }
  .gh-month-label { position: absolute; top: 0; font-size: 0.75em; color: var(--text-muted); white-space: nowrap; }
  .gh-day-label { position: absolute; left: 0; font-size: 0.72em; color: var(--text-muted); line-height: 11px; }
  .gh-cell { position: absolute; width: 11px; height: 11px; border-radius: 2px; cursor: default; transition: background 0.35s; }
  .gh-level-empty { background: transparent; }
  .gh-level-0 { background: var(--gh-0); }
  .gh-level-1 { background: var(--gh-1); }
  .gh-level-2 { background: var(--gh-2); }
  .gh-level-3 { background: var(--gh-3); }
  .gh-level-4 { background: var(--gh-4); }

  /* Tooltip */
  #tip {
    position: fixed; pointer-events: none; z-index: 9999;
    background: var(--tip-bg); color: #fff;
    padding: 6px 10px; border-radius: 4px;
    font-size: 0.78em; white-space: nowrap; display: none;
  }

  /* Theme toggle */
  #themeToggle {
    width: 56px; height: 30px; padding: 0; border-radius: 15px;
    background: #2d333b; border: 1px solid #444c56;
    position: relative; vertical-align: middle; overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
  }
  body.light #themeToggle { background: #c8e6ff; border-color: #86b7e8; }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 22px; height: 22px; border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
  }
  body.light .toggle-thumb { transform: translateX(26px); }
  .icon-moon, .icon-sun { position: absolute; transition: opacity 0.2s, transform 0.35s; line-height: 1; }
  .icon-sun { opacity: 0; transform: rotate(180deg) scale(0.3); }
  body.light .icon-moon { opacity: 0; transform: rotate(-180deg) scale(0.3); }
  body.light .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }

  /* New-lol pop */
  @keyframes lol-pop {
    0%   { transform: scale(1);    text-shadow: none; }
    30%  { transform: scale(1.18); text-shadow: 0 0 24px var(--green), 0 0 48px var(--green); }
    100% { transform: scale(1);    text-shadow: none; }
  }
  .lol-pop { animation: lol-pop 0.45s ease-out; }
  @media (prefers-reduced-motion: reduce) { .lol-pop { animation: none; } }

  /* Streak fire */
  @keyframes flicker {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
    33%  { transform: scale(0.92) rotate(-3deg); opacity: 0.75; }
    66%  { transform: scale(1.08) rotate(3deg); opacity: 0.9; }
  }
  .fire-emoji, .hourglass-emoji { display: inline-block; font-size: 1.5em; vertical-align: middle; }
  .fire-emoji[data-tier="0"] { opacity: 0; }
  .fire-emoji[data-tier="1"] { animation: flicker 2.2s ease-in-out infinite; }
  .fire-emoji[data-tier="2"] { animation: flicker 1.3s ease-in-out infinite; }
  .fire-emoji[data-tier="3"] { animation: flicker 0.7s ease-in-out infinite; font-size: 1.7em; }
  .fire-emoji[data-tier="4"] { animation: flicker 0.35s ease-in-out infinite; font-size: 1.9em; }
  .hourglass-emoji[data-tier="0"] { animation: flicker 3s ease-in-out infinite; }
  .hourglass-emoji[data-tier="1"] { animation: flicker 2.2s ease-in-out infinite; }
  .hourglass-emoji[data-tier="2"] { animation: flicker 1.4s ease-in-out infinite; }
  .hourglass-emoji[data-tier="3"] { animation: flicker 0.8s ease-in-out infinite; }
  .hourglass-emoji[data-tier="4"] { animation: flicker 0.4s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .fire-emoji, .hourglass-emoji { animation: none !important; } }
</style>
</head>
<body>

<h1>:lol: Stats</h1>
<button id="pickBtn">Load lol.db</button>
<button id="shareBtn">Copy for Slack</button>
<span id="shareFeedback">Copied!</span>
<span id="status"></span>
<button id="themeToggle" title="Toggle theme"><span class="toggle-thumb"><span class="icon-moon">🌙</span><span class="icon-sun">☀️</span></span></button>

<div id="stats">
  <h2>Total lols</h2>
  <div class="total" id="total"></div>

  <h2>Streaks &amp; Records</h2>
  <div class="streak-grid">
    <div class="streak-box"><div class="val" id="todayCount"></div><div class="lbl"><span class="hourglass-emoji">⏳</span> today</div></div>
    <div class="streak-box"><div class="val" id="currentStreak"></div><div class="lbl"><span class="fire-emoji" data-tier="0">🔥</span> current weekday streak</div></div>
    <div class="streak-box"><div class="val" id="bestStreak"></div><div class="lbl">🏆 best weekday streak</div></div>
    <div class="streak-box"><div class="val" id="bestDay"></div><div class="lbl">👑 most lols in one day</div></div>
  </div>

  <h2>This year</h2>
  <div id="githubHeatmapWrap"></div>

  <h2>Lols per day (last 30 days)</h2>
  <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>

  <h2>Hourly distribution</h2>
  <div class="chart-wrap"><canvas id="hourlyChart"></canvas></div>

  <h2>Hour × weekday heatmap</h2>
  <div id="heatmapWrap"></div>

  <h2>Recent lols</h2>
  <table id="recentTable">
    <tr><th>When</th></tr>
  </table>
</div>

<div id="tip"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(async () => {
  let SQL, fileHandle, lastModified = 0;
  let dailyChart, hourlyChart;
  let shareStats = { today: 0, total: 0, streak: 0 };
  let previousTotal = -1;
  const rafMap = {}, prevVals = {};
  function popEl(el) {
    el.classList.remove('lol-pop');
    void el.offsetWidth;
    el.classList.add('lol-pop');
    el.addEventListener('animationend', () => el.classList.remove('lol-pop'), { once: true });
  }
  function countUp(id, to) {
    const el = document.getElementById(id);
    const isFirst = prevVals[id] === undefined;
    const from = prevVals[id] ?? 0;
    prevVals[id] = to;
    if (rafMap[id]) cancelAnimationFrame(rafMap[id]);
    if (!isFirst || from === to) { el.textContent = to; return; }
    const dur = 1500, t0 = performance.now();
    const ease = t => 1 - (1 - t) * (1 - t);
    function step(now) {
      const t = Math.min((now - t0) / dur, 1);
      el.textContent = Math.round(from + (to - from) * ease(t));
      if (t < 1) rafMap[id] = requestAnimationFrame(step);
      else { delete rafMap[id]; popEl(el); }
    }
    rafMap[id] = requestAnimationFrame(step);
  }

  function isLight() { return document.body.classList.contains('light'); }
  function chartColors() {
    const l = isLight();
    return {
      green:    l ? '#2ea043'              : '#63e663',
      greenBg1: l ? 'rgba(46,160,67,0.1)' : 'rgba(99,230,99,0.1)',
      greenBg4: l ? 'rgba(46,160,67,0.3)' : 'rgba(99,230,99,0.4)',
      border:   l ? '#d0d7de'             : '#222',
      text:     l ? '#57606a'             : '#666',
    };
  }
  function applyChartTheme() {
    const c = chartColors();
    Chart.defaults.color = c.text;
    Chart.defaults.borderColor = c.border;
    if (dailyChart) {
      dailyChart.data.datasets[0].borderColor = c.green;
      dailyChart.data.datasets[0].backgroundColor = c.greenBg1;
      dailyChart.update('none');
    }
    if (hourlyChart) {
      hourlyChart.data.datasets[0].backgroundColor = c.greenBg4;
      hourlyChart.data.datasets[0].borderColor = c.green;
      hourlyChart.update('none');
    }
  }

  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

  Chart.defaults.color = chartColors().text;
  Chart.defaults.borderColor = chartColors().border;

  const idb = await new Promise((res, rej) => {
    const r = indexedDB.open('lol-stats', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('handles');
    r.onsuccess = () => res(r.result);
    r.onerror = rej;
  });

  const idbGet = key => new Promise((res, rej) => {
    const tx = idb.transaction('handles', 'readonly').objectStore('handles').get(key);
    tx.onsuccess = () => res(tx.result); tx.onerror = rej;
  });

  const idbSet = (key, val) => new Promise((res, rej) => {
    const tx = idb.transaction('handles', 'readwrite').objectStore('handles').put(val, key);
    tx.onsuccess = res; tx.onerror = rej;
  });

  async function startPolling(handle) {
    fileHandle = handle;
    SQL = SQL ?? await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
    lastModified = 0;
    await refresh();
    setInterval(refresh, 2000);
    document.getElementById('pickBtn').textContent = fileHandle.name + ' ✓';
  }

  const saved = await idbGet('fileHandle');
  if (saved && (await saved.queryPermission({ mode: 'read' })) === 'granted')
    startPolling(saved);

  document.getElementById('pickBtn').addEventListener('click', async () => {
    const opts = { types: [{ accept: { 'application/x-sqlite3': ['.db'] } }] };
    if (fileHandle) opts.startIn = fileHandle;
    else if (saved) opts.startIn = saved;
    [fileHandle] = await window.showOpenFilePicker(opts);
    await idbSet('fileHandle', fileHandle);
    await startPolling(fileHandle);
  });

  const tipEl = document.getElementById('tip');
  function tipMove(e) {
    const cell = e.target.closest('[data-tip]');
    if (cell) {
      tipEl.textContent = cell.dataset.tip;
      tipEl.style.display = 'block';
      tipEl.style.left = (e.clientX + 12) + 'px';
      tipEl.style.top = (e.clientY - 20) + 'px';
    } else {
      tipEl.style.display = 'none';
    }
  }
  function tipOff() { tipEl.style.display = 'none'; }
  ['githubHeatmapWrap', 'heatmapWrap'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('mousemove', tipMove);
    el.addEventListener('mouseleave', tipOff);
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    const nowLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', nowLight ? 'light' : 'dark');
    applyChartTheme();
  });

  document.getElementById('shareBtn').addEventListener('click', async () => {
    const { today, total, streak } = shareStats;
    const streakStr = streak === 1 ? '1 weekday' : `${streak} weekdays`;
    const text = `:lol: *Lol Report* — ${new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}\n\n:calendar: Today: ${today} lols\n:trophy: All-time: ${total} lols\n:fire: Streak: ${streakStr}`;
    await navigator.clipboard.writeText(text);
    const fb = document.getElementById('shareFeedback');
    fb.style.opacity = '1';
    setTimeout(() => fb.style.opacity = '0', 2000);
  });

  // Add n days to a local 'YYYY-MM-DD' string; noon anchor avoids DST edge cases
  function addLocalDays(dateStr, n) {
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() + n);
    return d.toLocaleDateString('en-CA');
  }

  function isWeekend(dateStr) {
    const dow = new Date(dateStr + 'T12:00:00').getDay();
    return dow === 0 || dow === 6;
  }

  function nextWeekday(dateStr) {
    let d = addLocalDays(dateStr, 1);
    while (isWeekend(d)) d = addLocalDays(d, 1);
    return d;
  }

  function computeStreaks(allDays) {
    if (!allDays.length) return { current: 0, best: 0 };
    const daySet = new Set(allDays);

    // current streak: walk backwards from today, weekends are transparent
    let current = 0;
    let cursor = new Date().toLocaleDateString('en-CA');
    while (true) {
      if (isWeekend(cursor)) { cursor = addLocalDays(cursor, -1); continue; }
      if (!daySet.has(cursor)) break;
      current++;
      cursor = addLocalDays(cursor, -1);
    }

    // best streak: consecutive weekdays only
    const weekdays = allDays.filter(d => !isWeekend(d)).sort();
    if (!weekdays.length) return { current, best: 0 };
    let best = 1, run = 1;
    for (let i = 1; i < weekdays.length; i++) {
      if (weekdays[i] === nextWeekday(weekdays[i - 1])) { run++; if (run > best) best = run; }
      else run = 1;
    }

    return { current, best };
  }

  function buildGithubHeatmap(dailyMap) {
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const CELL = 11, GAP = 3, STEP = CELL + GAP;
    const DAY_LABEL_W = 26, MONTH_H = 20;

    const today = new Date();
    const year = today.getFullYear();

    // First Monday on or before Jan 1
    const jan1 = new Date(year, 0, 1);
    const dow = jan1.getDay(); // 0=Sun
    const daysBack = dow === 0 ? 6 : dow - 1;
    const firstMonday = new Date(year, 0, 1 - daysBack);

    // Build week columns
    // Extend to the Sunday that ends the week containing Dec 31
    const dec31 = new Date(year, 11, 31);
    const dec31Row = (dec31.getDay() + 6) % 7; // Mon=0 … Sun=6
    const lastSunday = new Date(year, 11, 31 + (6 - dec31Row));

    const weeks = [];
    const cur = new Date(firstMonday);
    while (cur <= lastSunday) {
      const week = [];
      for (let d = 0; d < 7; d++) {
        const day = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate() + d);
        const inYear = day.getFullYear() === year;
        const future = day > today;
        const ds = day.toLocaleDateString('en-CA');
        week.push({ day, inYear, future, ds, count: (inYear && !future) ? (dailyMap[ds] || 0) : null });
      }
      weeks.push(week);
      cur.setDate(cur.getDate() + 7);
    }

    const max = Math.max(1, ...weeks.flat().filter(d => d.count !== null).map(d => d.count));
    const ghLevel = n => !n ? 0 : n / max <= 0.25 ? 1 : n / max <= 0.5 ? 2 : n / max <= 0.75 ? 3 : 4;

    // Month labels: week index where the 1st of each month first appears
    const seenMonths = new Set(), monthLabels = [];
    weeks.forEach((week, wi) => {
      for (const d of week) {
        if (d.inYear && d.day.getDate() === 1 && !seenMonths.has(d.day.getMonth())) {
          seenMonths.add(d.day.getMonth());
          monthLabels.push({ wi, name: MONTHS[d.day.getMonth()] });
        }
      }
    });

    const totalW = DAY_LABEL_W + weeks.length * STEP - GAP;
    const totalH = MONTH_H + 7 * STEP - GAP;

    let html = `<div class="gh-heatmap" style="width:${totalW}px;height:${totalH}px">`;

    for (const { wi, name } of monthLabels)
      html += `<span class="gh-month-label" style="left:${DAY_LABEL_W + wi * STEP}px">${name}</span>`;

    // Mon / Wed / Fri labels (rows 0, 2, 4)
    for (const [di, label] of [[0,'Mon'],[2,'Wed'],[4,'Fri']]) {
      const y = MONTH_H + di * STEP + Math.round((CELL - 10) / 2);
      html += `<span class="gh-day-label" style="top:${y}px">${label}</span>`;
    }

    weeks.forEach((week, wi) => {
      const x = DAY_LABEL_W + wi * STEP;
      week.forEach((d, di) => {
        const y = MONTH_H + di * STEP;
        if (!d.inYear) {
          html += `<div class="gh-cell gh-level-empty" style="left:${x}px;top:${y}px"></div>`;
          return;
        }
        if (d.future) {
          html += `<div class="gh-cell gh-level-0" style="left:${x}px;top:${y}px" data-tip="${d.day.toLocaleDateString()} — 0 lols"></div>`;
          return;
        }
        const tip = `${d.day.toLocaleDateString()} — ${d.count} lol${d.count !== 1 ? 's' : ''}`;
        html += `<div class="gh-cell gh-level-${ghLevel(d.count)}" style="left:${x}px;top:${y}px" data-tip="${tip}"></div>`;
      });
    });

    html += '</div>';
    document.getElementById('githubHeatmapWrap').innerHTML = `<div class="gh-heatmap-wrap">${html}</div>`;
  }

  function buildHeatmap(heatData) {
    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const max = Math.max(1, ...Object.values(heatData));

    // Header row inside the grid: empty corner + 24 hour labels
    let html = '<div class="heatmap"><div class="row-label"></div>';
    for (let h = 0; h < 24; h++)
      html += `<div class="col-label">${h}</div>`;

    // 7 day rows
    for (let d = 0; d < 7; d++) {
      html += `<div class="row-label">${DAYS[d]}</div>`;
      for (let h = 0; h < 24; h++) {
        const n = heatData[`${d}:${h}`] || 0;
        const alpha = n ? (0.15 + 0.85 * (n / max)).toFixed(2) : 0;
        const bg = n ? `rgba(var(--green-rgb),${alpha})` : 'var(--bg-cell)';
        const tip = `${DAYS[d]} ${h}:00 — ${n} lol${n !== 1 ? 's' : ''}`;
        html += `<div class="cell" style="background:${bg}" data-tip="${tip}"></div>`;
      }
    }
    html += '</div>';
    document.getElementById('heatmapWrap').innerHTML = html;
  }

  async function refresh() {
    const file = await fileHandle.getFile();
    if (file.lastModified === lastModified) return;
    lastModified = file.lastModified;

    const db = new SQL.Database(new Uint8Array(await file.arrayBuffer()));
    const q = sql => { const r = db.exec(sql); return r[0]; };

    // Pull all timestamps once; all bucketing done in JS with local time
    const allRows = q("SELECT lolled_at FROM lols ORDER BY lolled_at");
    const dates = allRows ? allRows.values.map(r => new Date(r[0])) : [];

    const newTotal = dates.length;
    if (previousTotal >= 0 && newTotal > previousTotal)
      popEl(document.getElementById('total'));
    previousTotal = newTotal;
    countUp('total', newTotal);
    shareStats.total = newTotal;

    // Aggregate using local time
    const dailyMap = {}, hourlyData = Array(24).fill(0), heatData = {};
    for (const d of dates) {
      const day = d.toLocaleDateString('en-CA');
      dailyMap[day] = (dailyMap[day] || 0) + 1;
      const h = d.getHours();
      hourlyData[h]++;
      heatData[`${d.getDay()}:${h}`] = (heatData[`${d.getDay()}:${h}`] || 0) + 1;
    }

    // Streaks
    const allDays = [...new Set(dates.map(d => d.toLocaleDateString('en-CA')))].sort();
    const { current, best } = computeStreaks(allDays);
    countUp('currentStreak', current);
    countUp('bestStreak', best);
    const fireTier = current === 0 ? 0 : current <= 5 ? 1 : current <= 14 ? 2 : current <= 29 ? 3 : 4;
    document.querySelector('.fire-emoji').dataset.tier = fireTier;
    shareStats.streak = current;
    shareStats.today = dailyMap[new Date().toLocaleDateString('en-CA')] || 0;
    countUp('todayCount', shareStats.today);
    const hourglassTier = shareStats.today === 0 ? 0 : shareStats.today <= 20 ? 1 : shareStats.today <= 50 ? 2 : shareStats.today <= 99 ? 3 : 4;
    document.querySelector('.hourglass-emoji').dataset.tier = hourglassTier;
    const bestDayCount = allDays.reduce((max, day) => Math.max(max, dailyMap[day] || 0), 0);
    countUp('bestDay', bestDayCount);

    // Daily chart — last 30 local days
    const dailyLabels = [], dailyChartData = [];
    for (let i = 29; i >= 0; i--) {
      const day = addLocalDays(new Date().toLocaleDateString('en-CA'), -i);
      dailyLabels.push(day.slice(5)); // MM-DD
      dailyChartData.push(dailyMap[day] || 0);
    }
    if (dailyChart) {
      dailyChart.data.labels = dailyLabels;
      dailyChart.data.datasets[0].data = dailyChartData;
      dailyChart.update();
    } else {
      dailyChart = new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: {
          labels: dailyLabels,
          datasets: [{ data: dailyChartData, borderColor: chartColors().green,
            backgroundColor: chartColors().greenBg1, borderWidth: 1.5,
            pointRadius: 2, fill: true, tension: 0.3 }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { maxTicksLimit: 10 } }, y: { beginAtZero: true, ticks: { stepSize: 1 } } },
          animation: false
        }
      });
    }

    // Hourly chart
    const hourlyLabels = Array.from({ length: 24 }, (_, i) => i + ':00');
    if (hourlyChart) {
      hourlyChart.data.datasets[0].data = hourlyData;
      hourlyChart.update();
    } else {
      hourlyChart = new Chart(document.getElementById('hourlyChart'), {
        type: 'bar',
        data: {
          labels: hourlyLabels,
          datasets: [{ data: hourlyData, backgroundColor: chartColors().greenBg4,
            borderColor: chartColors().green, borderWidth: 1 }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
          animation: false
        }
      });
    }

    // GitHub year heatmap
    buildGithubHeatmap(dailyMap);

    // Heatmap
    buildHeatmap(heatData);

    // Recent
    const recentRows = q("SELECT lolled_at FROM lols ORDER BY lolled_at DESC LIMIT 20");
    const recentTable = document.getElementById('recentTable');
    recentTable.innerHTML = '<tr><th>When</th></tr>';
    if (recentRows) for (const [ts] of recentRows.values)
      recentTable.innerHTML += `<tr><td>${new Date(ts).toLocaleString()}</td></tr>`;

    db.close();
    document.getElementById('stats').style.display = 'block';
    document.getElementById('shareBtn').style.display = 'inline-block';
    document.getElementById('status').textContent = 'updated ' + new Date().toLocaleTimeString();
  }
})();
</script>
</body>
</html>
